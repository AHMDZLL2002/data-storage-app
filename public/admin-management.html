<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Management - Data Storage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">
    <div class="navbar">
      <h2>Admin Management</h2>
      <div class="user-info">
        <span>Welcome, <strong id="username">Admin</strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <button class="back-btn" onclick="window.location.href='/dashboard'">← Back to Dashboard</button>

    <div class="dashboard-container">
      <h1>Paparan ADMIN</h1>

      <!-- Upload Notice Section -->
      <div class="admin-section">
        <h2>📤 Muatnaik Notis/Nota kepada Semua Pengguna</h2>
        <form id="noticeForm">
          <div class="form-group">
            <label for="noticeTitle">Tajuk Notis (diperlukan):</label>
            <input type="text" id="noticeTitle" name="noticeTitle" placeholder="e.g., Pengumuman Penting" required>
          </div>
          <div class="form-group">
            <label for="noticeContent">Kandungan Notis (diperlukan):</label>
            <textarea id="noticeContent" name="noticeContent" rows="5" placeholder="Tulis kandungan notis di sini..." required></textarea>
          </div>
          <div class="form-group">
            <label for="noticeCategory">Kategori:</label>
            <select id="noticeCategory" name="noticeCategory">
              <option value="Pengumuman">Pengumuman</option>
              <option value="Peringatan">Peringatan</option>
              <option value="Maklumat">Maklumat</option>
              <option value="Urgent">Urgent</option>
            </select>
          </div>
          <button type="submit" class="btn">Hantar Notis ke Semua Pengguna</button>
          <div id="noticeMessage" class="message"></div>
        </form>
      </div>

      <!-- Notices Sent History -->
      <div class="admin-section">
        <h2>📋 Sejarah Notis yang Dihantar</h2>
        <table class="data-table" id="noticeTable">
          <thead>
            <tr>
              <th>No.</th>
              <th>Tajuk</th>
              <th>Kategori</th>
              <th>Tarikh Dihantar</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="noticeBody">
            <tr>
              <td colspan="5" style="text-align: center; padding: 20px;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Register New Admin Section -->
      <div class="admin-section">
        <h2>👤 Register Pentadbir Baru</h2>
        <form id="registerForm">
          <div class="form-group">
            <label for="newUsername">Username (diperlukan):</label>
            <input type="text" id="newUsername" name="newUsername" required>
          </div>
          <div class="form-group">
            <label for="newPassword">Password (diperlukan):</label>
            <input type="password" id="newPassword" name="newPassword" required minlength="5">
          </div>
          <button type="submit" class="btn">Register Admin Baru</button>
          <div id="registerMessage" class="message"></div>
        </form>
      </div>

      <!-- Admin List Section -->
      <div class="admin-section">
        <h2>👥 Senarai Pentadbir</h2>
        <table class="data-table" id="adminTable">
          <thead>
            <tr>
              <th>No.</th>
              <th>Username</th>
              <th>Tarikh Daftar</th>
              <th>Tindakan</th>
            </tr>
          </thead>
          <tbody id="adminBody">
            <tr>
              <td colspan="4" style="text-align: center; padding: 20px;">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // Loading state management
    let isLoading = false;

    // Show loading indicator
    function showLoading(elementId, message = 'Memuatkan...') {
      const element = document.getElementById(elementId);
      if (element) {
        element.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 20px;"><div class="loading-spinner"></div> ${message}</td></tr>`;
      }
    }

    // Hide loading indicator
    function hideLoading(elementId) {
      // Loading will be replaced by actual content
    }

    // Load user info
    async function loadUserInfo() {
      try {
        const response = await fetch('/api/user', { credentials: 'same-origin' });
        const data = await response.json();
        const username = data.user?.username || data.username || 'Admin';
        document.getElementById('username').textContent = username;
      } catch (error) {
        console.error('Error loading user info:', error);
        document.getElementById('username').textContent = 'Admin';
      }
    }

    // Load notices history with loading indicator
    async function loadNoticeHistory() {
      if (isLoading) return;
      isLoading = true;

      showLoading('noticeBody', 'Memuatkan sejarah notis...');

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout

        const response = await fetch('/api/notices', {
          signal: controller.signal,
          credentials: 'same-origin',
          headers: {
            'Cache-Control': 'no-cache'
          }
        });
        clearTimeout(timeoutId);

        const result = await response.json();

        if (result.success && result.notices.length > 0) {
          const tbody = document.getElementById('noticeBody');
          tbody.innerHTML = '';
          result.notices.forEach((notice, index) => {
            const row = document.createElement('tr');
            const date = new Date(notice.created_at).toLocaleDateString('ms-MY') + ' ' + new Date(notice.created_at).toLocaleTimeString('ms-MY');
            row.innerHTML = `
              <td>${index + 1}</td>
              <td>${notice.title}</td>
              <td><span class="category-badge">${notice.category}</span></td>
              <td>${date}</td>
              <td><span class="status-badge success">Dihantar</span></td>
            `;
            tbody.appendChild(row);
          });
        } else {
          document.getElementById('noticeBody').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px;">Tiada notis dihantar</td></tr>';
        }
      } catch (error) {
        console.error('Error loading notice history:', error);
        if (error.name === 'AbortError') {
          document.getElementById('noticeBody').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px; color: #f44336;">⏱️ Masa tamat - Sila cuba lagi</td></tr>';
        } else {
          document.getElementById('noticeBody').innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 20px; color: #f44336;">❌ Ralat memuatkan data</td></tr>';
        }
      } finally {
        isLoading = false;
      }
    }

    // Upload notice
    document.getElementById('noticeForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const title = document.getElementById('noticeTitle').value.trim();
      const content = document.getElementById('noticeContent').value.trim();
      const category = document.getElementById('noticeCategory').value;
      const messageDiv = document.getElementById('noticeMessage');

      console.log('Submitting notice:', { title, content, category });

      if (!title || !content) {
        messageDiv.textContent = 'Sila isi semua medan yang diperlukan';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
        return;
      }

      // Show loading state
      const submitBtn = document.querySelector('#noticeForm button[type="submit"]');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = 'Menghantar...';
      submitBtn.disabled = true;

      try {
        console.log('Making API call to /api/notices');
        const response = await fetch('/api/notices', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ title, content, category })
        });

        console.log('API response status:', response.status);
        const result = await response.json();
        console.log('API response:', result);

        if (result.success) {
          messageDiv.textContent = 'Notis berjaya dihantar kepada semua pengguna!';
          messageDiv.className = 'message success';
          messageDiv.style.display = 'block';
          document.getElementById('noticeForm').reset();

          // Reload notice history after 2 seconds
          setTimeout(() => {
            loadNoticeHistory();
            messageDiv.style.display = 'none';
          }, 2000);
        } else {
          messageDiv.textContent = result.message || 'Terjadi ralat';
          messageDiv.className = 'message error';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        console.error('Error submitting notice:', error);
        messageDiv.textContent = 'Terjadi ralat. Sila cuba lagi.';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
      } finally {
        // Reset button state
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
      }
    });

    // Load admin list with loading indicator
    async function loadAdminList() {
      if (isLoading) return;
      isLoading = true;

      showLoading('adminBody', 'Memuatkan senarai pentadbir...');

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout

        const response = await fetch('/api/users', {
          signal: controller.signal,
          credentials: 'same-origin',
          headers: {
            'Cache-Control': 'no-cache'
          }
        });
        clearTimeout(timeoutId);

        const result = await response.json();

        if (result.success && result.users.length > 0) {
          const tbody = document.getElementById('adminBody');
          tbody.innerHTML = '';
          result.users.forEach((user, index) => {
            const row = document.createElement('tr');
            const date = new Date(user.created_at).toLocaleDateString('ms-MY');
            row.innerHTML = `
              <td>${index + 1}</td>
              <td>${user.username}</td>
              <td>${date}</td>
              <td>
                ${user.username !== 'admin' ? `<button class="delete-btn" onclick="deleteAdmin('${user.username}', ${user.id})">Delete</button>` : '<span style="color: #999;">-</span>'}
              </td>
            `;
            tbody.appendChild(row);
          });
        } else {
          document.getElementById('adminBody').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px;">Tiada pentadbir</td></tr>';
        }
      } catch (error) {
        console.error('Error loading admin list:', error);
        if (error.name === 'AbortError') {
          document.getElementById('adminBody').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px; color: #f44336;">⏱️ Masa tamat - Sila cuba lagi</td></tr>';
        } else {
          document.getElementById('adminBody').innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 20px; color: #f44336;">❌ Ralat memuatkan data</td></tr>';
        }
      } finally {
        isLoading = false;
      }
    }

    // Register new admin
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const messageDiv = document.getElementById('registerMessage');

      if (username.length < 3) {
        messageDiv.textContent = 'Username harus minimal 3 karakter';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/api/users', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
          messageDiv.textContent = 'Admin baru berhasil didaftar!';
          messageDiv.className = 'message success';
          messageDiv.style.display = 'block';
          document.getElementById('registerForm').reset();

          // Reload admin list after 1 second
          setTimeout(() => {
            loadAdminList();
          }, 1000);
        } else {
          messageDiv.textContent = result.message;
          messageDiv.className = 'message error';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        messageDiv.textContent = 'Error registering admin. Please try again.';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
      }
    });

    // Delete admin
    async function deleteAdmin(username, userId) {
      if (username === 'admin') {
        alert('Cannot delete default admin user');
        return;
      }

      if (!confirm(`Are you sure you want to delete admin "${username}"?`)) {
        return;
      }

      try {
        const response = await fetch(`/api/users/${userId}`, {
          method: 'DELETE',
          credentials: 'same-origin'
        });

        const result = await response.json();

        if (result.success) {
          alert('Admin deleted successfully');
          loadAdminList();
        } else {
          alert('Error: ' + result.message);
        }
      } catch (error) {
        alert('Error deleting admin');
        console.error('Error:', error);
      }
    }

    // Logout
    async function logout() {
      try {
        const response = await fetch('/api/logout', {
          method: 'POST',
          credentials: 'same-origin'
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/';
        }
      } catch (error) {
        console.error('Error logging out:', error);
      }
    }

    // Load user info, admin list and notice history on page load (sequentially)
    async function initializePage() {
      try {
        await loadUserInfo();
        await loadAdminList();
        await loadNoticeHistory();
      } catch (error) {
        console.error('Error initializing page:', error);
      }
    }

    // Start initialization
    initializePage();
</body>
</html>
