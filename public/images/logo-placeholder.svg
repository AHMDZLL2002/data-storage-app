<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="white" stroke="#667eea" stroke-width="3"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="200" cy="150" r="80" fill="url(#grad1)"/>
  
  <!-- Document icon -->
  <rect x="160" y="110" width="80" height="100" rx="5" fill="white"/>
  <line x1="175" y1="135" x2="225" y2="135" stroke="#667eea" stroke-width="3"/>
  <line x1="175" y1="155" x2="225" y2="155" stroke="#667eea" stroke-width="2"/>
  <line x1="175" y1="170" x2="225" y2="170" stroke="#667eea" stroke-width="2"/>
  <line x1="175" y1="185" x2="215" y2="185" stroke="#667eea" stroke-width="2"/>
  
  <!-- Bottom text area -->
  <rect x="100" y="250" width="200" height="100" rx="10" fill="#f0f0f0"/>
  
  <!-- Text -->
  <text x="200" y="285" font-size="18" font-weight="bold" text-anchor="middle" fill="#667eea">
    Data System
  </text>
  <text x="200" y="310" font-size="14" text-anchor="middle" fill="#666">
    Management Portal
  </text>
  <text x="200" y="330" font-size="12" text-anchor="middle" fill="#999">
    Powered by Organization
  </text>
</svg>
