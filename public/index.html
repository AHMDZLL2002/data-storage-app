<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sistem Pengurusan Data Sekretariat Sabah Maju Jaya untuk rekod kewangan, pemantauan peruntukan, dan laporan buku vot.">
  <meta name="robots" content="index, follow">
  <meta name="google-site-verification" content="a7159o9hzsxneGtuxKgNsu0HhhW4GOOoAenPdEhFGL4">
  <meta property="og:title" content="Sistem Pengurusan Data SSMJ">
  <meta property="og:description" content="Portal rasmi pengurusan data Sekretariat Sabah Maju Jaya.">
  <meta property="og:type" content="website">
  <title>Data Storage - Login</title>
  <link rel="icon" type="image/png" href="images/logo-main.png">
  <link rel="stylesheet" href="style.css">
  <script src="i18n.js"></script>
</head>
<body>
  <!-- Login Header -->
  <div class="login-header">
    <div class="header-content">
      <div class="logo-section">
        <img src="images/logo-main.png" alt="Organization Logo" class="logo-image" onerror="this.src='images/logo-placeholder.svg'">
      </div>
      <div class="header-text">
        <h1 class="institution-name">Data Management System</h1>
        <p class="institution-subtitle">Sistem Pengurusan Data</p>
      </div>
    </div>
    <!-- Language Selector for Login -->
    <div class="language-selector" style="position: absolute; top: 10px; right: 10px;">
      <button class="language-btn" id="languageBtn">🌐 Language</button>
      <div class="language-dropdown" id="languageDropdown">
        <button class="lang-option" onclick="setLanguage('en-US')">🇺🇸 English (US)</button>
        <button class="lang-option" onclick="setLanguage('ms-MY')">🇲🇾 Bahasa Malaysia</button>
        <button class="lang-option" onclick="setLanguage('id-ID')">🇮🇩 Bahasa Indonesia</button>
        <button class="lang-option" onclick="setLanguage('th-TH')">🇹🇭 ภาษาไทย</button>
        <button class="lang-option" onclick="setLanguage('vi-VN')">🇻🇳 Tiếng Việt</button>
        <button class="lang-option" onclick="setLanguage('fil-PH')">🇵🇭 Filipino</button>
      </div>
    </div>
  </div>

  <div class="login-container">
    <h2>Login Portal</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn">Login</button>
      <div id="message" class="message"></div>
    </form>
  </div>

  <!-- Login Footer -->
  <div class="login-footer">
    <div class="footer-content">
      <div class="footer-logo">
        <img src="images/logo-footer.png" alt="Organization Logo" class="footer-logo-image" onerror="this.src='images/logo-placeholder.svg'">
      </div>
      <div class="footer-text">
        <p class="copyright-text">
          Hakcipta Terpelihara 2026 © Sekretariat Sabah Maju Jaya, Jabatan Ketua Menteri
        </p>
        <p class="developer-text">
          Dibangunkan oleh Bahagian Pentadbiran & Kewangan - SSMJ
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (data.success) {
          messageDiv.textContent = 'Login successful! Redirecting...';
          messageDiv.className = 'message success';
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1000);
        } else {
          messageDiv.textContent = data.message;
          messageDiv.className = 'message error';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        messageDiv.textContent = 'An error occurred. Please try again.';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
      }
    });

    // Language dropdown toggle
    document.getElementById('languageBtn').addEventListener('click', function() {
      const dropdown = document.getElementById('languageDropdown');
      dropdown.classList.toggle('show');
    });

    // Close language dropdown when clicking outside
    document.addEventListener('click', function(event) {
      const selector = document.querySelector('.language-selector');
      if (!selector.contains(event.target)) {
        document.getElementById('languageDropdown').classList.remove('show');
      }
    });
  </script>
</body>
</html>
