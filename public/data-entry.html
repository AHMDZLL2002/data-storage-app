<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Entry - Data Storage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">
    <div class="navbar">
      <h2>Data Entry</h2>
      <div class="user-info">
        <span>Welcome, <strong id="username">User</strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <a href="/dashboard" class="back-link">← Back to Dashboard</a>

    <div class="data-entry-container">
      <div class="data-entry-header">
        <h1>📝 Masukkan Data Baru</h1>
        <p class="data-entry-subtitle">Isi maklumat transaksi dengan lengkap dan tepat</p>
      </div>

      <form id="dataForm" class="data-entry-form">
        <!-- Transaction Details -->
        <div class="form-section">
          <h3>📋 Maklumat Transaksi</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="tarikh">📅 Tarikh (Date) *</label>
              <input type="date" id="tarikh" name="tarikh" required>
            </div>
            <div class="form-group">
              <label for="rujukan">🔢 Rujukan (Reference)</label>
              <input type="text" id="rujukan" name="rujukan" placeholder="e.g. INV-2024-001">
            </div>
          </div>

          <div class="form-group">
            <label for="dibayar_kepada">👤 Dibayar Kepada (Paid To)</label>
            <input type="text" id="dibayar_kepada" name="dibayar_kepada" placeholder="Nama penerima">
          </div>

          <div class="form-group">
            <label for="perkara">📝 Perkara (Subject/Matter) *</label>
            <textarea id="perkara" name="perkara" required placeholder="Penerangan transaksi" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label for="liabiliti">⚖️ Liabiliti (Liability)</label>
            <input type="text" id="liabiliti" name="liabiliti" placeholder="Butiran liabiliti">
          </div>
        </div>

        <!-- Financial Information -->
        <div class="form-section">
          <h3>💰 Maklumat Kewangan</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="bayaran">💵 Bayaran (Payment)</label>
              <input type="number" id="bayaran" name="bayaran" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label for="jumlah_bayaran">🧮 Jumlah Bayaran (Total Payment)</label>
              <input type="number" id="jumlah_bayaran" name="jumlah_bayaran" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
              <label for="baki">⚖️ Baki (Balance)</label>
              <input type="number" id="baki" name="baki" step="0.01" min="0" placeholder="0.00">
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">
            <span class="btn-icon">💾</span>
            Simpan Data
          </button>
          <button type="button" class="btn btn-secondary" onclick="resetForm()">
            <span class="btn-icon">🔄</span>
            Reset
          </button>
        </div>
        <div id="message" class="message"></div>
      </form>
    </div>
  </div>

  <script>
    // Load user info
    async function loadUserInfo() {
      try {
        const response = await fetch('/api/user');
        const data = await response.json();
        document.getElementById('username').textContent = data.username;
      } catch (error) {
        console.error('Error loading user info:', error);
      }
    }

    // Category selection - removed, using default category
    document.addEventListener('DOMContentLoaded', function() {
      // Set default category (can be changed later if needed)
      // For now, all new entries will be categorized as 'Perbekalan' by default
    });

    // Reset form function
    function resetForm() {
      document.getElementById('dataForm').reset();
      // Clear message
      document.getElementById('message').innerHTML = '';
    }

    // Handle form submission
    document.getElementById('dataForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const category = 'Perbekalan'; // Default category since selection was removed
      const tarikh = document.getElementById('tarikh').value;
      const rujukan = document.getElementById('rujukan').value;
      const dibayar_kepada = document.getElementById('dibayar_kepada').value;
      const perkara = document.getElementById('perkara').value;
      const liabiliti = document.getElementById('liabiliti').value;
      const bayaran = document.getElementById('bayaran').value;
      const jumlah_bayaran = document.getElementById('jumlah_bayaran').value;
      const baki = document.getElementById('baki').value;
      const messageDiv = document.getElementById('message');

      if (!tarikh || !perkara) {
        messageDiv.textContent = 'Sila isi Tarikh dan Perkara';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
        return;
      }

      // Show loading state
      const submitBtn = document.querySelector('#dataForm button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<span class="loading-spinner"></span> Menyimpan...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/data', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            category,
            tarikh,
            rujukan,
            dibayar_kepada,
            perkara,
            liabiliti,
            bayaran,
            jumlah_bayaran,
            baki
          })
        });

        const result = await response.json();

        if (result.success) {
          messageDiv.textContent = '✅ Data berjaya disimpan!';
          messageDiv.className = 'message success';
          messageDiv.style.display = 'block';

          // Reset form after 2 seconds
          setTimeout(() => {
            resetForm();
          }, 2000);
        } else {
          messageDiv.textContent = result.message || '❌ Ralat menyimpan data';
          messageDiv.className = 'message error';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        console.error('Error saving data:', error);
        messageDiv.textContent = '❌ Ralat menyimpan data. Sila cuba lagi.';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
      } finally {
        // Reset button state
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });

    // Logout
    async function logout() {
      try {
        const response = await fetch('/api/logout', {
          method: 'POST'
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/';
        }
      } catch (error) {
        console.error('Error logging out:', error);
      }
    }

    // Initialize
    loadUserInfo();
  </script>
</body>
</html>
