<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Entry - Data Storage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">
    <div class="navbar">
      <h2>Data Entry</h2>
      <div class="user-info">
        <span>Welcome, <strong id="username">User</strong></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <a href="/dashboard" class="back-link">← Back to Dashboard</a>

    <div class="data-entry-container">
      <h1>Enter New Data</h1>
      <form id="dataForm">
        <div class="form-group">
          <label for="tarikh">Tarikh (Date) *</label>
          <input type="date" id="tarikh" name="tarikh" required>
        </div>

        <div class="form-group">
          <label for="rujukan">Rujukan (Reference)</label>
          <input type="text" id="rujukan" name="rujukan" placeholder="e.g. INV-2024-001">
        </div>

        <div class="form-group">
          <label for="dibayar_kepada">Dibayar Kepada (Paid To)</label>
          <input type="text" id="dibayar_kepada" name="dibayar_kepada" placeholder="Recipient name">
        </div>

        <div class="form-group">
          <label for="perkara">Perkara (Subject/Matter) *</label>
          <input type="text" id="perkara" name="perkara" required placeholder="Description of transaction">
        </div>

        <div class="form-group">
          <label for="liabiliti">Liabiliti (Liability)</label>
          <input type="text" id="liabiliti" name="liabiliti" placeholder="Liability details">
        </div>

        <div class="form-group">
          <label for="bayaran">Bayaran (Payment)</label>
          <input type="number" id="bayaran" name="bayaran" step="0.01" min="0" placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="jumlah_bayaran">Jumlah Bayaran (Total Payment)</label>
          <input type="number" id="jumlah_bayaran" name="jumlah_bayaran" step="0.01" min="0" placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="baki">Baki (Balance)</label>
          <input type="number" id="baki" name="baki" step="0.01" min="0" placeholder="0.00">
        </div>

        <button type="submit" class="btn">Save Data</button>
        <div id="message" class="message"></div>
      </form>
    </div>
  </div>

  <script>
    // Load user info
    async function loadUserInfo() {
      try {
        const response = await fetch('/api/user');
        const data = await response.json();
        document.getElementById('username').textContent = data.username;
      } catch (error) {
        console.error('Error loading user info:', error);
      }
    }

    // Handle form submission
    document.getElementById('dataForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const tarikh = document.getElementById('tarikh').value;
      const rujukan = document.getElementById('rujukan').value;
      const dibayar_kepada = document.getElementById('dibayar_kepada').value;
      const perkara = document.getElementById('perkara').value;
      const liabiliti = document.getElementById('liabiliti').value;
      const bayaran = document.getElementById('bayaran').value;
      const jumlah_bayaran = document.getElementById('jumlah_bayaran').value;
      const baki = document.getElementById('baki').value;
      const messageDiv = document.getElementById('message');

      try {
        const response = await fetch('/api/data', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            tarikh,
            rujukan,
            dibayar_kepada,
            perkara,
            liabiliti,
            bayaran,
            jumlah_bayaran,
            baki
          })
        });

        const result = await response.json();

        if (result.success) {
          messageDiv.textContent = 'Data saved successfully!';
          messageDiv.className = 'message success';
          messageDiv.style.display = 'block';

          // Clear form
          document.getElementById('dataForm').reset();

          // Redirect to dashboard after 2 seconds
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 2000);
        } else {
          messageDiv.textContent = result.message;
          messageDiv.className = 'message error';
          messageDiv.style.display = 'block';
        }
      } catch (error) {
        messageDiv.textContent = 'An error occurred. Please try again.';
        messageDiv.className = 'message error';
        messageDiv.style.display = 'block';
      }
    });

    // Logout
    async function logout() {
      try {
        const response = await fetch('/api/logout', {
          method: 'POST'
        });
        const data = await response.json();

        if (data.success) {
          window.location.href = '/';
        }
      } catch (error) {
        console.error('Error logging out:', error);
      }
    }

    // Load user info on page load
    loadUserInfo();
  </script>
</body>
</html>
